# ─────────────────────────────────────────────────────────────
# Short Bot #2 — конфиг (paper trading на реальных данных Bybit)
# Сценарий Б: монета впервые #1 по росту → откат на #2 → шорт #2
# ─────────────────────────────────────────────────────────────

# ── Торговля ──
direction: short              # short | long
mode: live                    # paper | live  (live = реальные ордера через executor)

# ── Риск (под депозит $143) ──
risk_pct: 3.0                 # % депозита на сделку (теряем при стопе)
initial_balance: 143.0        # стартовый депозит (для логов/дашборда)
max_open_positions: 3         # 3 позиции, изолированная маржа — ликвидация одной не трогает другие
max_daily_entries: 15         # лимит входов в день

# ── Плечо и маржа ──
leverage: 3                   # плечо (3x → ликвидация при -33%, SL -25% успевает)
margin_mode: isolated         # isolated | cross (isolated = риск только позиции)

# ── Стратегия: SL/TP/Trail/DCA ──
# SL ОТКЛЮЧЕН — юзер контролирует опасные ситуации руками.
# Бэктест 917 входов: без SL Net +2796% (vs +2600 со SL25), MaxDD −39.5% (vs −52.8%).
# 9 из 12 SL-срабатываний были иглами (цена вернулась ниже avg) — SL снимал прибыль на пике.
sl_pct: 0.0                  # 0 = SL conditional order НЕ ставится. Защита = TP + trail + ручной контроль.
tp_chain: [20.0, 20.0, 20.0, 20.0, 20.0, 20.0]  # TP % на каждом DCA уровне (от avg)
trail_pct: 3.0                # трейлинг % (на DCA×4-5)
trail_at_dca: 4               # DCA уровень с которого включается trail
trail_active_pct: 5.0         # активация trail при падении на 5% ниже avg (в плюсе)
activation_pct: 1.0           # (legacy, не используется в live)
be_plus_at_dca: 4             # DCA уровень с которого TP = avg (выход в плюс)

# ── DCA усреднение ──
dca_enabled: true
dca_max_count: 5              # 5 усреднений → позиция 6x
# Схема DCA: рост от avg на каждом уровне. 10/15/20/25/30 — первый DCA ближе (avg+10%),
# усреднение начинается раньше → avg ниже → меньше убытка на пампе.
# Бэктест: 10/15/20/25/30 даёт Net +2600, WR 82.9% vs 15×5 +2523, WR 81.5%.
dca_trigger_pct: [10.0, 15.0, 20.0, 25.0, 30.0]  # % роста от avg для каждого DCA уровня (1..5)
dca_qty_multiplier: 1.0       # каждый DCA докупает ×1 от оригинального qty
# qty позиции: без SL риск-расчёт через sl_pct ломается — используем явный % depо на notional.
risk_notional_pct: 20.0       # notional позиции = balance × risk_notional_pct / 100 (≈ $37 при $185 depо, 3x lev)
min_sl_hold_seconds: 30       # (legacy, биржа держит SL)

# ── Комиссии и проскальзывание ──
commission_taker_pct: 0.055   # Bybit taker RT (0.055% round-trip)
slippage_pct: 0.02            # проскальзывание на вход/выход
funding_interval_hours: 8     # Bybit funding каждые 8 часов
funding_rate_avg: 0.0001      # средний фандинг 0.01% за интервал (аппроксимация)

# ── Сигнал ──
ranking_interval_min: 15      # пересчёт ранжирования каждые N минут
min_volume_usd: 100000        # мин. объём за день (фильтр неликвида)
min_gain_pct: 0.0             # мин. рост от open для участия в ранге
cooldown_symbol_hours: 24     # бан монеты после входа (часы)
min_candles_for_rank: 10      # мин. минутных свечей с начала дня

# ── Фильтр монет ──
exclude_heavy: true           # исключить BTC/ETH/SOL и др. крупные
exclude_symbols: []           # явно исключить (пусто = ничего)
# Список "тяжёлых" монет (если exclude_heavy = true)
heavy_symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - XRPUSDT
  - DOGEUSDT
  - BNBUSDT
  - ADAUSDT
  - LTCUSDT
  - BCHUSDT
  - TRXUSDT
  - DOTUSDT
  - AVAXUSDT
  - LINKUSDT
  - TONUSDT
  - MATICUSDT
  - SHIBUSDT
  - NEARUSDT
  - APTUSDT
  - FILUSDT
  - ARBUSDT
  - OPUSDT

# ── Bybit API ──
bybit_rest_url: https://api.bybit.com
bybit_ws_url: wss://stream.bybit.com/v5/public/linear
bybit_ws_max_reconnect: 999
bybit_ws_ping_sec: 20

# ── Логи ──
log_dir: ./logs
trades_file: ./logs/trades.jsonl
positions_file: ./logs/positions.json
equity_file: ./logs/equity.jsonl
log_level: INFO
